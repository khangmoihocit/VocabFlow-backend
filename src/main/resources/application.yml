#spring.application.name=VocabFlow
server:
  port: 8085

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/vocabflow_db
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    # QUAN TRỌNG: Khi dùng Flyway, KHÔNG ĐƯỢC để Hibernate tự tạo bảng nữa
    # Chỉ cho phép nó 'validate' xem Entity code có khớp với Database thật không
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true # Cho phép chạy Flyway trên database đã có sẵn table (nếu có)
    locations: classpath:db/migration # Đường dẫn chứa file SQL

  api:
    prefix: /api/v1

  jwt:
    signerKey: U29tZXZlcnlsb25ncmFuZG9tc3RyaW5ndGhhdGlzbW9yZXRoYW42NGJ5dGVzZm9yaHM1MTJzZWN1cml0eWNoZWNrMTIzNDU2Nzg5MQA=
    valid-duration: 7200 #in second (2 hour)
    refreshable-duration: 432000 #in second 432 000 (5day)
    issuer: khangmoihocit

  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY_1}
        chat:
          options:
            model: gemini-2.5-flash-lite
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${CLIENT_ID}
            client-secret: ${CLIENT_SECRET}

gemini:
  model: gemini-2.5-flash-lite
  key-cooldown-seconds: 60  # Thời gian (giây) chờ trước khi thử lại key bị lỗi
  api-keys:
    - ${GEMINI_API_KEY_1}
    - ${GEMINI_API_KEY_2}
    - ${GEMINI_API_KEY_3}
    - ${GEMINI_API_KEY_4}
    - ${GEMINI_API_KEY_5}
    - ${GEMINI_API_KEY_6}

cloudinary:
  cloud-name: ${CLOUD_NAME}
  api-key: ${CLOUD_API_KEY}
  api-secret: ${CLOUD_API_SECRET}
